services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=vox_db
      - POSTGRES_USER=vox_user
      - POSTGRES_PASSWORD=vox_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vox_user -d vox_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    # Removed bind mounts to bypass macOS permission issues
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://vox_user:vox_pass@db:5432/vox_db
      - REDIS_URL=redis://redis:6379/0
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - PUBLIC_URL=${PUBLIC_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    # Removed bind mounts to bypass macOS permission issues
    ports:
      - "5173:5173"
    environment:
      - VITE_WS_BACKEND_URL=ws://localhost:8000/ws/voice/

volumes:
  postgres_data:
